<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
    
</head>

<body>
    <header id="nav">
        <div class="nav-left">
            <h1><span class="bold">Tourist</span> Image Gallery</h1>
        </div>
        <button id="nav-toggle" aria-label="Toggle menu">☰</button>
        <nav class="nav-links" id="nav-links">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>

    <section id="gallery-section">
        <div class="controls">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
                <button class="filter-btn" data-filter="city">City</button>
                <button class="filter-btn" data-filter="people">People</button>
            </div>
        </div>

        <div id="gallery" class="gallery">
            <figure class="card" data-category="nature"><img src="images/1 (1).jpg" alt="Mountain homestay" class="gallery-image"><figcaption class="caption">Mountain homestay</figcaption></figure>
            <figure class="card" data-category="city"><img src="images/1 (2).jpg" alt="Pine forest" class="gallery-image"><figcaption class="caption">Pine forest</figcaption></figure>
            <figure class="card" data-category="nature"><img src="images/1 (3).jpg" alt="Sunset viewpoint" class="gallery-image"><figcaption class="caption">Sunset viewpoint</figcaption></figure>
            <figure class="card" data-category="people"><img src="images/1 (4).jpg" alt="Rocky Cave" class="gallery-image"><figcaption class="caption">Rocky Cave</figcaption></figure>
            <figure class="card" data-category="city"><img src="images/1 (5).jpg" alt="Mountain Street" class="gallery-image"><figcaption class="caption">Mountain Street</figcaption></figure>
            <figure class="card" data-category="nature"><img src="images/1 (6).jpg" alt="Lakeside view" class="gallery-image"><figcaption class="caption">Lakeside View</figcaption></figure>
            <figure class="card" data-category="people"><img src="images/1 (7).jpg" alt="Restaurant Interior" class="gallery-image"><figcaption class="caption">Restaurant Interior</figcaption></figure>
            <figure class="card" data-category="city"><img src="images/1 (8).jpg" alt="Decorated Balcony" class="gallery-image"><figcaption class="caption">Decorated Balcony</figcaption></figure>
        </div>

        <div id="lightbox" class="lightbox hidden" aria-hidden="true">
            <button class="lb-close" aria-label="Close">✕</button>
            <button class="lb-prev" aria-label="Previous">◀</button>
            <div class="lb-inner">
                <img class="lb-image" src="" alt="Expanded image">
                <div class="lb-caption" aria-hidden="false"></div>
            </div>
            <div class="lb-toolbar">
                <button class="lb-zoom" aria-label="Toggle zoom">🔍</button>
                <button class="lb-download" aria-label="Download image">⬇</button>
            </div>
            <button class="lb-next" aria-label="Next">▶</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
